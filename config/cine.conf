server {

       listen 443 ssl;

       server_name cinemarche.marche.be;

       root /var/www/sitesftp/cinemarche;

       index index.html index.php;

       # Laravel app under /mailing/ subdirectory.
       # ^~ is REQUIRED: without it, the server-level WordPress regex locations
       # (~ \.php$  and  ~* \.(js|css|png|jpg|...)$) outrank this prefix location
       # and steal every asset/PHP request under /mailing/, serving them from the
       # WordPress docroot (404). ^~ stops regex evaluation so the nested locations
       # below handle them.
       location ^~ /mailing {
          alias /var/www/mailing-lists/public;

          # Livewire assets (livewire.js, livewire.min.js, update, upload, etc.) are
          # DYNAMIC routes served by PHP, not files on disk. They must hit Laravel
          # before the static-asset regex below claims them (it matches any *.js).
          location ~ ^/mailing/livewire- {
              try_files $uri $uri/ @laravel;
          }

          # Handle static assets first (CSS, JS, images, fonts, etc.)
          location ~* ^/mailing/(.*\.(css|js|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|pdf|zip|tar|gz|rar))$ {
              alias /var/www/mailing-lists/public/$1;
              expires 1y;
              add_header Cache-Control "public, immutable";
              access_log off;
              break;
          }

          # Handle PHP files
          location ~ ^/mailing(/.+\.php)$ {
              alias /var/www/mailing-lists/public;
              fastcgi_pass php;
              include fastcgi_params;
              fastcgi_param SCRIPT_FILENAME /var/www/mailing-lists/public$1;
              fastcgi_param SCRIPT_NAME /mailing$1;
              fastcgi_param REQUEST_URI $request_uri;
             break;
          }

          # Handle Laravel routing (including Livewire routes)
          location /mailing {
              alias /var/www/mailing-lists/public;
              try_files $uri $uri/ @laravel;
          }
    }

    # Handle Livewire routes specifically
    location /livewire {
        rewrite ^/livewire/(.*)$ /mailing/livewire/$1 last;
    }

    # Named location for Laravel routing
    location @laravel {
        fastcgi_pass php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/mailing-lists/public/index.php;
        fastcgi_param SCRIPT_NAME /mailing/index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Security: deny access to sensitive files
    location ~ ^/mailing/\.(htaccess|htpasswd|ini|log|sh|sql|conf)$ {
        deny all;
    }

    # Deny access to hidden files
    location ~ ^/mailing/\. {
        deny all;
    }

    #############
    # WORDPRESS
    ###############

       include global/wordpress-restrictions.conf;
       include global/letsencrypt.conf;

       location / {
            # This is cool because no php is touched for static content.
            # include the "?$args" part so non-default permalinks doesn't break when using query string
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            #NOTE: You should have "cgi.fix_pathinfo = 0;" in php.ini
            include fastcgi.conf;
            fastcgi_intercept_errors on;
            fastcgi_pass php;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif)$ {
            expires max;
            log_not_found off;
        }

        error_log /var/log/nginx/cinemarche_error.log warn;
        access_log /var/log/nginx/access.log main_ext;
}
